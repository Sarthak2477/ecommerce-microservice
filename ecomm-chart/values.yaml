# Default values for ecomm chart.
# This is a YAML-formatted file.

# Global Docker Repository Configuration
# Replace 'yourdockerhubuser' with your actual Docker Hub username!
global:
  image:
    repositoryPrefix: "yourdockerhubuser"
    tag: "latest"
    pullPolicy: "Always"

# Database Configuration
postgres:
  image: "postgres:16-alpine"
  dbName: "postgres"
  username: "postgres"
  password: "secret"
  resources: {}

# Redis Configuration
redis:
  image: "redis:7-alpine"
  resources: {}

# Kafka Configuration
kafka:
  image: "apache/kafka:3.7.0"
  clusterId: "MkU3OEVBNTcwNTJENDM2Qk"
  resources: {}

# JWT configuration
security:
  jwtSecret: "qHaRsJX5t4bndubo4eH5LZbVIjzn5lpQRHqvrEZuLhBdY4L5"

# Microservices default resources
microservices:
  resources: {}
  # Java Tool Options to restrict heap space
  javaOpts: "-Xms32m -Xmx128m -XX:+UseG1GC"

# Specific service ports
services:
  apiGateway:
    port: 8080
  productService:
    port: 8081
  orderService:
    port: 8082
  inventoryService:
    port: 8083
  userService:
    port: 8084
  notificationService:
    port: 8085
  paymentService:
    port: 8086

# Monitoring Configuration
monitoring:
  enabled: false
  prometheus:
    image: "prom/prometheus:v2.45.0"
    resources: {}
  grafana:
    image: "grafana/grafana-oss:10.0.0"
    adminPassword: "admin"
    resources: {}
