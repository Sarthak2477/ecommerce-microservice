{{- if .Values.monitoring.enabled }}
# Prometheus Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-server-conf
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'spring-boot-apps'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets:
            - 'product-service:{{ .Values.services.productService.port }}'
            - 'order-service:{{ .Values.services.orderService.port }}'
            - 'inventory-service:{{ .Values.services.inventoryService.port }}'
            - 'user-service:{{ .Values.services.userService.port }}'
            - 'payment-service:{{ .Values.services.paymentService.port }}'
            - 'api-gateway:{{ .Values.services.apiGateway.port }}'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: "{{ .Values.monitoring.prometheus.image }}"
        args:
          - "--config.file=/etc/prometheus/prometheus.yml"
          - "--storage.tsdb.path=/prometheus/"
        ports:
        - containerPort: 9090
        volumeMounts:
        - name: config-volume
          mountPath: /etc/prometheus/
        resources:
          {{- toYaml .Values.monitoring.prometheus.resources | nindent 10 }}
      volumes:
      - name: config-volume
        configMap:
          name: prometheus-server-conf
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
spec:
  ports:
  - port: 9090
    targetPort: 9090
  selector:
    app: prometheus

---
# Grafana Configuration
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: "{{ .Values.monitoring.grafana.image }}"
        ports:
        - containerPort: 3000
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: "{{ .Values.monitoring.grafana.adminPassword }}"
        resources:
          {{- toYaml .Values.monitoring.grafana.resources | nindent 10 }}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
spec:
  ports:
  - port: 3000
    targetPort: 3000
  selector:
    app: grafana
{{- end }}
