# 1. API Gateway Deployment & Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: "{{ .Values.global.image.repositoryPrefix }}/ecomm-api-gateway:{{ .Values.global.image.tag }}"
        imagePullPolicy: "{{ .Values.global.image.pullPolicy }}"
        ports:
        - containerPort: {{ .Values.services.apiGateway.port }}
        envFrom:
        - configMapRef:
            name: ecomm-config
        resources:
          {{- toYaml .Values.microservices.resources | nindent 10 }}
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  ports:
  - port: {{ .Values.services.apiGateway.port }}
    targetPort: {{ .Values.services.apiGateway.port }}
  selector:
    app: api-gateway

