name: CI/CD Multi-Cluster Deployer

on:
  push:
    branches:
      - main
  # Allows you to trigger the deployment manually and select the cluster
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

env:
  DOCKER_USER: "sarthak247" # Replace with your Docker Hub user

jobs:
  # Job 1: Compile code and build/push Docker Images
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: api-gateway
            image: ecomm-api-gateway
          - service: user-service
            image: ecomm-user-service
          - service: product_service
            image: ecomm-product-service
          - service: order-service
            image: ecomm-order-service
          - service: inventory-service
            image: ecomm-inventory-service
          - service: payment_service
            image: ecomm-payment-service
          - service: notification-service
            image: ecomm-notification-service
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Inject Local Config Files
        run: |
          SERVICE_NAME="${{ matrix.service }}"
          # Replace underscore with hyphen to match the config filename (e.g. product_service -> product-service)
          CONFIG_NAME="${SERVICE_NAME//_/-}"
          CONFIG_FILE="config/${CONFIG_NAME}.properties"
          
          if [ -f "$CONFIG_FILE" ]; then
            echo "Injecting $CONFIG_FILE into ${SERVICE_NAME}/src/main/resources/application.properties"
            mkdir -p "${SERVICE_NAME}/src/main/resources"
            cp "$CONFIG_FILE" "${SERVICE_NAME}/src/main/resources/application.properties"
          else
            echo "No config file found at $CONFIG_FILE"
          fi

      - name: Compile and Package Jars
        run: |
          cd ${{ matrix.service }}
          mvn clean package -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          # Tags the image with the git commit SHA as well as 'latest'
          tags: |
            ${{ env.DOCKER_USER }}/${{ matrix.image }}:latest
            ${{ env.DOCKER_USER }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 2: Deploy to the selected Kubernetes Cluster
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Set Target Environment
        run: |
          # If triggered manually, use the selected input. If triggered by push, default to 'dev'.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TARGET_ENV=${{ github.event.inputs.environment }}" >> $GITHUB_ENV
          else
            echo "TARGET_ENV=dev" >> $GITHUB_ENV
          fi

      - name: Configure Kubectl Credentials (Kubeconfig)
        run: |
          mkdir -p ~/.kube
          if [ "${{ env.TARGET_ENV }}" = "prod" ]; then
            echo "${{ secrets.KUBECONFIG_PROD }}" > ~/.kube/config
          else
            echo "${{ secrets.KUBECONFIG_DEV }}" > ~/.kube/config
          fi
          chmod 600 ~/.kube/config

      - name: Test Connection to Target Cluster
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Deploy Stack using Helm
        run: |
          # Checks if values file exists for selected env, uses default values.yaml if not.
          VALUES_FILE="ecomm-chart/values-${{ env.TARGET_ENV }}.yaml"
          
          if [ -f "$VALUES_FILE" ]; then
            echo "Deploying with environment values: $VALUES_FILE"
            helm upgrade --install ecomm ./ecomm-chart \
              --namespace ecomm \
              --create-namespace \
              --values $VALUES_FILE \
              --set global.image.repositoryPrefix=${{ env.DOCKER_USER }} \
              --set global.image.tag=${{ github.sha }}
          else
            echo "Deploying with default values.yaml"
            helm upgrade --install ecomm ./ecomm-chart \
              --namespace ecomm \
              --create-namespace \
              --set global.image.repositoryPrefix=${{ env.DOCKER_USER }} \
              --set global.image.tag=${{ github.sha }}
          fi
