server.port=8085
spring.kafka.bootstrap-servers=localhost:9092
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.hostname=localhost
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
# Configure ErrorHandlingDeserializer to delegate to JsonDeserializer
spring.kafka.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
# Trust all packages for deserialization
spring.kafka.properties.spring.json.trusted.packages=*
spring.kafka.properties.spring.json.type.mapping=com.example.order_service.event.OrderPlacedEvent:com.example.notification_service.event.OrderPlacedEvent